<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Speech Player with Repeat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; margin-top: 0; }
        textarea { width: 100%; height: 180px; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 18px; line-height: 1.6; box-sizing: border-box; margin-bottom: 20px; transition: border-color 0.3s; }
        textarea:focus { border-color: #3498db; outline: none; }
        .controls { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .speed-control { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .repeat-control { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: bold; color: #555; }
        button { padding: 12px 28px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; transition: transform 0.1s, opacity 0.2s; }
        .btn-play { background-color: #2ecc71; color: white; }
        .btn-stop { background-color: #e74c3c; color: white; }
        button:active { transform: scale(0.95); }
        button:hover { opacity: 0.9; }
        #display-area { 
            padding: 20px; border: 1px solid #eee; border-radius: 10px; min-height: 80px; 
            font-size: 22px; line-height: 1.8; color: #444; background: #fff; border: 2px dashed #ddd;
        }
        .highlight { background-color: #ffeb3b; border-bottom: 2px solid #fbc02d; padding: 0 2px; }
    </style>
</head>
<body>

<div class="container">
    <h2>English Speech Player</h2>
    
    <textarea id="text-input" placeholder="Enter English text here...">Success is not final, failure is not fatal: it is the courage to continue that counts.</textarea>

    <div class="controls">
        <button class="btn-play" onclick="speakText()">Play / Restart</button>
        <button class="btn-stop" onclick="stopText()">Stop</button>
        
        <div class="speed-control">
            <label for="speed-range">Speed: <span id="speed-val">100</span>%</label>
            <input type="range" id="speed-range" min="0.2" max="1.2" step="0.05" value="1.0" oninput="updateSpeed(this.value)">
        </div>

        <label class="repeat-control">
            <input type="checkbox" id="repeat-check"> Repeat
        </label>
    </div>

    <div id="display-area"></div>
</div>

<script>
    const synth = window.speechSynthesis;
    const textInput = document.getElementById('text-input');
    const displayArea = document.getElementById('display-area');
    const speedVal = document.getElementById('speed-val');
    const repeatCheck = document.getElementById('repeat-check');
    
    let isStopPressed = false;

    function updateSpeed(val) {
        speedVal.innerText = Math.round(val * 100);
    }

    function stopText() {
        isStopPressed = true; // ループを防止
        synth.cancel();
        // ハイライトをクリア
        const spans = displayArea.querySelectorAll('span');
        spans.forEach(s => s.classList.remove('highlight'));
    }

    function speakText() {
        synth.cancel();
        isStopPressed = false;

        const text = textInput.value;
        if (!text) return;

        // 表示エリアをセットアップ
        const words = text.split(/(\s+)/);
        displayArea.innerHTML = words.map((w, i) => `<span id="word-${i}">${w}</span>`).join('');

        const utterance = new SpeechSynthesisUtterance(text);
        
        // 音声の設定
        const voices = synth.getVoices();
        utterance.voice = voices.find(v => v.lang.startsWith('en')) || voices[0];
        utterance.lang = 'en-US';
        utterance.rate = document.getElementById('speed-range').value;

        // ハイライト処理
        utterance.onboundary = (event) => {
            if (event.name === 'word') {
                const beforeText = text.substring(0, event.charIndex);
                const wordIndex = beforeText.split(/(\s+)/).length - 1;
                
                const spans = displayArea.querySelectorAll('span');
                spans.forEach(s => s.classList.remove('highlight'));

                const target = document.getElementById(`word-${wordIndex}`);
                if (target) {
                    target.classList.add('highlight');
                    target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
        };

        // 終了時の処理（リピート）
        utterance.onend = () => {
            if (repeatCheck.checked && !isStopPressed) {
                // 少しだけ間を置いてから再開
                setTimeout(speakText, 500);
            }
        };

        synth.speak(utterance);
    }

    // ページ読み込み時の音声リスト初期化（Chrome対策）
    window.speechSynthesis.onvoiceschanged = () => { synth.getVoices(); };
</script>

</body>
</html>
